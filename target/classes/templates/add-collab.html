<!-- HTML5 -->
<!DOCTYPE html>
<!-- XML namespace -->
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
	<head>
	    <title>Add Collaborator</title>
	    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
	    <meta content="width=device-width, initial-scale=1, ie=edge">
	    <meta name="viewport">
	    <link th:href="@{/css/mystyle.css}" rel="stylesheet" />
	</head>

	<body>
		<h3>Add Collaborator</h3>
	    <form action="#" th:action="@{/ao/addcollab}" th:object="${collaborator}" method="post">
	        <label for="name" class="col-form-label">Name</label> 
	        <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Name"> <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
	        <label for="email" class="col-form-label">Email</label>
	        <input type="text" th:field="*{email}" class="form-control" id="email" placeholder="Email"> <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
	        <input type="submit" class="btn btn-primary" value="Add Collaborator">
        </form>
	</body>

</html>
